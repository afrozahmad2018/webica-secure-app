name: Webica Build Engine
on: [push]
jobs:
  build_apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Android Project From Scratch
        run: |
          mkdir -p app/src/main/java/com/webica/app
          mkdir -p app/src/main/res/values

          # 1. Android Manifest
          cat <<EOF > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <application android:label="Webica Learning" android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                  <activity android:name="com.webica.app.MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # 2. MainActivity.java (Recording Block Code)
          cat <<EOF > app/src/main/java/com/webica/app/MainActivity.java
          package com.webica.app;
          import android.os.Bundle;
          import android.view.WindowManager;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import androidx.appcompat.app.AppCompatActivity;
          import java.util.HashMap;
          import java.util.Map;
          public class MainActivity extends AppCompatActivity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  getWindow().setFlags(WindowManager.LayoutParams.FLAG_SECURE, WindowManager.LayoutParams.FLAG_SECURE);
                  WebView webView = new WebView(this);
                  setContentView(webView);
                  WebSettings webSettings = webView.getSettings();
                  webSettings.setJavaScriptEnabled(true);
                  webSettings.setDomStorageEnabled(true);
                  webView.setWebViewClient(new WebViewClient());
                  Map<String, String> headers = new HashMap<>();
                  headers.put("X-Requested-With", "com.webica.app");
                  webView.loadUrl("https://webica.info/player.php", headers);
              }
          }
          EOF

          # 3. Themes & Styles
          cat <<EOF > app/src/main/res/values/themes.xml
          <resources><style name="Theme.AppCompat.Light.NoActionBar" parent="Theme.AppCompat.Light.NoActionBar"/></resources>
          EOF

          # 4. Build Configurations
          echo "rootProject.name='WebicaApp'" > settings.gradle
          echo "buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.1.0' } }
          allprojects { repositories { google(); mavenCentral() } }" > build.gradle
          echo "apply plugin: 'com.android.application'
          android { namespace 'com.webica.app'; compileSdk 34; defaultConfig { applicationId 'com.webica.app'; minSdk 24; targetSdk 34; versionCode 1; versionName '1.0' } }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }" > app/build.gradle

      - name: Build APK
        run: |
          gradle wrapper --gradle-version 8.0
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Webica-Secure-App
          path: app/build/outputs/apk/debug/app-debug.apk
